<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>《百年孤独》动物统计</title>
    <link rel="icon" type="image/png" sizes="64x64" href="../assets/favicon.png" />
    <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./data.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <div class="header-copy">
        <a class="home-link" href="../">返回入口</a>
        <p class="eyebrow">One Hundred Years of Solitude.epub</p>
        <h1>《百年孤独》动物统计</h1>
        <p class="lede">基于英文版 20 章正文，整理动物名、家畜、鸟类昆虫和动物意象的出现次数与章节分布。</p>
      </div>
      <div class="header-facts" aria-label="数据概览">
        <div>
          <span id="fact-mentions">--</span>
          <small>动物提及</small>
        </div>
        <div>
          <span id="fact-animals">--</span>
          <small>动物词组</small>
        </div>
        <div>
          <span id="fact-top">--</span>
          <small>最高频</small>
        </div>
      </div>
    </header>

    <main>
      <section class="kpi-grid" id="kpi-grid" aria-label="核心指标"></section>

      <section class="controls-band" aria-label="筛选和排序">
        <div class="search-box">
          <label for="search-input">搜索</label>
          <input id="search-input" type="search" placeholder="动物、英文、西语、摘要" autocomplete="off" />
        </div>
        <div class="control-group">
          <label for="category-filter">类别</label>
          <select id="category-filter"></select>
        </div>
        <div class="control-group">
          <label for="chapter-filter">章节</label>
          <select id="chapter-filter"></select>
        </div>
        <div class="control-group">
          <label for="sort-select">排序</label>
          <select id="sort-select">
            <option value="count">按提及次数</option>
            <option value="chapter">按首次章节</option>
            <option value="name">按英文名称</option>
          </select>
        </div>
        <div class="category-tabs" id="category-tabs" role="group" aria-label="动物类别筛选"></div>
        <div class="selected-filter" id="selected-filter" hidden></div>
      </section>

      <section class="overview-layout">
        <article class="panel">
          <div class="panel-heading">
            <div>
              <h2>类别分布</h2>
              <p>按当前筛选结果统计提及次数</p>
            </div>
          </div>
          <div class="category-bars" id="category-bars"></div>
        </article>

        <article class="panel heatmap-panel">
          <div class="panel-heading">
            <div>
              <h2>高频动物章节热力</h2>
              <p>显示当前筛选中提及数最高的动物词组</p>
            </div>
          </div>
          <div class="table-wrap">
            <table id="animal-heatmap"></table>
          </div>
        </article>
      </section>

      <section class="panel results-panel">
        <div class="panel-heading">
          <div>
            <h2>动物列表</h2>
            <p id="result-summary">--</p>
          </div>
        </div>
        <div class="animal-list" id="animal-list"></div>
      </section>

      <p class="source-note" id="source-note"></p>
    </main>
  </body>
</html>
