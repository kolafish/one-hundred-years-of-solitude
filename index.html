<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>《百年孤独》统计页面</title>
    <style>
      :root {
        --ink: #f8fbff;
        --soft: rgba(248, 251, 255, 0.78);
        --muted: rgba(248, 251, 255, 0.66);
        --line: rgba(255, 255, 255, 0.24);
        --card: rgba(12, 20, 28, 0.68);
        --card-hover: rgba(17, 29, 39, 0.82);
        --teal: #7ee0c7;
        --gold: #f5c96b;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
      }

      html,
      body {
        background:
          linear-gradient(90deg, rgba(8, 12, 17, 0.9) 0%, rgba(8, 12, 17, 0.74) 44%, rgba(8, 12, 17, 0.46) 100%),
          linear-gradient(180deg, rgba(8, 12, 17, 0.2) 0%, rgba(8, 12, 17, 0.88) 100%),
          url("./assets/spanish-cover.webp") center / cover no-repeat;
      }

      body {
        min-width: 320px;
        min-height: 100svh;
        margin: 0;
        overflow-x: hidden;
        color: var(--ink);
      }

      main {
        display: flex;
        flex-direction: column;
        gap: clamp(32px, 4vh, 52px);
        width: 100%;
        max-width: 1180px;
        min-height: 100svh;
        margin: 0 auto;
        padding: clamp(24px, 5vw, 62px) clamp(16px, 4vw, 42px);
        overflow: hidden;
      }

      .hero {
        display: flex;
        flex-direction: column;
        justify-content: center;
        width: 100%;
        min-width: 0;
        max-width: 820px;
        min-height: min(390px, 44svh);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--teal);
        font-size: 12px;
        font-weight: 820;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        max-width: 780px;
        margin: 0 0 16px;
        font-size: clamp(38px, 7vw, 76px);
        line-height: 1.02;
        letter-spacing: 0;
        overflow-wrap: anywhere;
        text-wrap: balance;
      }

      h1 span {
        display: block;
      }

      .lede {
        max-width: 690px;
        margin: 0;
        color: var(--soft);
        font-size: clamp(16px, 2vw, 20px);
        line-height: 1.75;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .link-grid {
        display: grid;
        width: 100%;
        min-width: 0;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      a.card {
        display: grid;
        min-width: 0;
        min-height: 204px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        box-shadow: var(--shadow);
        padding: 22px;
        color: inherit;
        text-decoration: none;
        backdrop-filter: blur(14px);
      }

      a.card:hover,
      a.card:focus-visible {
        border-color: rgba(126, 224, 199, 0.76);
        outline: none;
        background: var(--card-hover);
        box-shadow: 0 0 0 3px rgba(126, 224, 199, 0.18), var(--shadow);
      }

      .card-kicker {
        color: var(--gold);
        font-size: 12px;
        font-weight: 820;
      }

      .card strong {
        display: block;
        margin-top: 12px;
        color: var(--ink);
        font-size: clamp(22px, 3vw, 30px);
        line-height: 1.18;
      }

      .card p {
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.7;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .card-action {
        align-self: end;
        margin-top: 22px;
        color: var(--teal);
        font-weight: 820;
      }

      @media (max-width: 820px) {
        html,
        body {
          background:
            linear-gradient(180deg, rgba(8, 12, 17, 0.9) 0%, rgba(8, 12, 17, 0.68) 46%, rgba(8, 12, 17, 0.94) 100%),
            url("./assets/spanish-cover.webp") center top / cover no-repeat;
        }

        main {
          gap: 28px;
          padding-right: 20px;
          padding-left: 20px;
        }

        .hero {
          min-height: 340px;
        }

        .hero,
        .link-grid {
          width: min(350px, 100%);
          max-width: 100%;
        }

        a.card {
          width: 100%;
          max-width: 100%;
        }

        h1 {
          font-size: clamp(34px, 11vw, 46px);
          line-height: 1.08;
        }

        .link-grid {
          grid-template-columns: 1fr;
        }

        a.card {
          min-height: 184px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" aria-labelledby="site-title">
        <p class="eyebrow">One Hundred Years of Solitude</p>
        <h1 id="site-title"><span>《百年孤独》</span><span>统计页面</span></h1>
        <p class="lede">从人物出场到星期事件，把马孔多的家族、时间与命运拆成可浏览的章节线索。</p>
      </section>

      <section class="link-grid" aria-label="统计页面入口">
        <a class="card" href="./people/">
          <span class="card-kicker">人物与章节</span>
          <strong>人物章节热力图</strong>
          <p>按代际、章节和性别查看人物提及次数，保留原来的交互式章节热力表。</p>
          <span class="card-action">打开人物统计</span>
        </a>

        <a class="card" href="./weekday-events/">
          <span class="card-kicker">星期与事件</span>
          <strong>星期事件统计</strong>
          <p>整理 Sunday 到 Saturday 的 117 次星期词提及，按章节、星期和主题查看事件摘要。</p>
          <span class="card-action">打开星期统计</span>
        </a>
      </section>
    </main>
  </body>
</html>
