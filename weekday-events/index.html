<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>《百年孤独》星期事件统计</title>
    <link rel="icon" type="image/png" sizes="64x64" href="../assets/favicon.png" />
    <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./data.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <div class="header-copy">
        <p class="eyebrow">One Hundred Years of Solitude.epub</p>
        <h1>《百年孤独》星期事件统计</h1>
        <p class="lede">从星期日到星期六，整理全书 117 次星期词提及对应的上下文事件与章节位置。</p>
      </div>
      <div class="header-facts" aria-label="数据概览">
        <div>
          <span id="fact-events">--</span>
          <small>星期提及</small>
        </div>
        <div>
          <span id="fact-days">--</span>
          <small>星期类别</small>
        </div>
        <div>
          <span id="fact-top-day">--</span>
          <small>最多出现</small>
        </div>
      </div>
    </header>

    <main>
      <section class="kpi-grid" id="kpi-grid" aria-label="核心指标"></section>

      <section class="controls-band" aria-label="筛选和排序">
        <div class="search-box">
          <label for="search-input">搜索</label>
          <input id="search-input" type="search" placeholder="人物、事件、主题" autocomplete="off" />
        </div>
        <div class="control-group">
          <label for="chapter-filter">章节</label>
          <select id="chapter-filter"></select>
        </div>
        <div class="control-group">
          <label for="theme-filter">主题</label>
          <select id="theme-filter"></select>
        </div>
        <div class="day-tabs" id="day-tabs" role="group" aria-label="星期筛选"></div>
      </section>

      <section class="overview-layout">
        <article class="panel">
          <div class="panel-heading">
            <div>
              <h2>星期分布</h2>
              <p>按当前筛选结果统计</p>
            </div>
          </div>
          <div class="day-bars" id="day-bars"></div>
        </article>

        <article class="panel heatmap-panel">
          <div class="panel-heading">
            <div>
              <h2>章节热力</h2>
              <p>行是星期，列是章节</p>
            </div>
          </div>
          <div class="table-wrap">
            <table id="chapter-heatmap"></table>
          </div>
        </article>
      </section>

      <section class="panel results-panel">
        <div class="panel-heading">
          <div>
            <h2>事件摘要</h2>
            <p id="result-summary">--</p>
          </div>
        </div>
        <div class="event-list" id="event-list"></div>
      </section>

      <p class="source-note" id="source-note"></p>
    </main>
  </body>
</html>
