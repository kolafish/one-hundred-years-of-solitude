<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>《百年孤独》热门划线与评论</title>
    <link rel="icon" type="image/png" sizes="64x64" href="../assets/favicon.png" />
    <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css?v=20260526-highlight-redesign" />
    <script src="./data.js?v=20260526-full-quotes" defer></script>
    <script src="./app.js?v=20260526-highlight-redesign" defer></script>
  </head>
  <body>
    <header class="app-header">
      <div class="header-copy">
        <a class="home-link" href="../">返回入口</a>
        <p class="eyebrow">WeRead Popular Highlights</p>
        <h1>《百年孤独》热门划线与评论</h1>
        <p class="lede">
          基于微信读书热门划线接口整理，支持查看全书前 20 条热门划线，也可以切到每个章节查看本章前 20 条热门划线和高赞评论。
        </p>
      </div>
      <div class="header-facts" aria-label="数据概览">
        <div>
          <span id="fact-highlights">--</span>
          <small>全书热门</small>
        </div>
        <div>
          <span id="fact-comments">--</span>
          <small>章节热门</small>
        </div>
        <div>
          <span id="fact-top">--</span>
          <small>高赞评论</small>
        </div>
      </div>
    </header>

    <main>
      <section class="notice" aria-label="内容说明">
        <strong>内容口径</strong>
        <p>
          页面展示热门划线内容、摘要、热度和微信读书定位链接；过长评论默认折叠，可在卡片内展开查看。
        </p>
      </section>

      <section class="mode-panel" aria-label="视图切换">
        <button class="mode-card" id="mode-book" type="button" data-mode="book">
          <span>视图一</span>
          <strong>全书 Top 20</strong>
          <small>跨全书排序，适合快速看全书最热门的划线。</small>
          <em id="mode-book-count">-- 条</em>
        </button>
        <button class="mode-card" id="mode-chapter" type="button" data-mode="chapter">
          <span>视图二</span>
          <strong>分章节 Top 20</strong>
          <small>先选章节，再看该章节内部最热门的划线。</small>
          <em id="mode-chapter-count">-- 章</em>
        </button>
        <div class="chapter-picker" id="chapter-picker">
          <label for="scope-filter">章节</label>
          <select id="scope-filter"></select>
        </div>
      </section>

      <section class="kpi-grid" id="kpi-grid" aria-label="核心指标"></section>

      <section class="controls-band" aria-label="筛选和排序">
        <div class="search-box">
          <label for="search-input">搜索</label>
          <input id="search-input" type="search" placeholder="范围、主题、评论摘要" autocomplete="off" />
        </div>
        <div class="control-group">
          <label for="sort-select">排序</label>
          <select id="sort-select">
            <option value="highlight">按划线人数</option>
            <option value="comment">按最高评论赞数</option>
            <option value="position">按章节/位置</option>
          </select>
        </div>
      </section>

      <section class="highlight-list" id="highlight-list" aria-label="热门划线列表"></section>
    </main>
  </body>
</html>
